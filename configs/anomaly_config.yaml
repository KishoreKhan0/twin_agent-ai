detector:
  rolling_window_samples: 300
  min_periods: 30

  anomaly_thresholds:
    low: 0.25
    medium: 0.45
    high: 0.70

  incident_grouping:
    min_duration_seconds: 20
    max_gap_seconds: 90

sensors:
  temperature_c:
    weight: 1.35
    direction: upper
    warning_min: 82
    high_min: 90
    z_warning: 99
    z_high: 100

  vibration_mm_s:
    weight: 1.50
    direction: upper
    warning_min: 1.4
    high_min: 2.5
    z_warning: 99
    z_high: 100

  current_a:
    weight: 1.15
    direction: upper
    warning_min: 14.2
    high_min: 15.2
    z_warning: 99
    z_high: 100

  rpm:
    weight: 0.85
    direction: outside
    warning_min: 1150
    warning_max: 1850
    high_min: 1050
    high_max: 1950
    z_warning: 99
    z_high: 100

  throughput_units_min:
    weight: 0.80
    direction: lower
    warning_min: 55
    high_min: 35
    z_warning: 99
    z_high: 100
