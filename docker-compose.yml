services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twinagent-api
    command: python scripts/launch_api.py
    environment:
      PYTHONPATH: /app/src
      TWINAGENT_API_HOST: 0.0.0.0
      TWINAGENT_API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twinagent-dashboard
    command: python scripts/launch_dashboard.py
    environment:
      PYTHONPATH: /app/src
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twinagent-pipeline
    command: python scripts/run_full_pipeline.py
    environment:
      PYTHONPATH: /app/src
    volumes:
      - .:/app
    profiles:
      - pipeline
