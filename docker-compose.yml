services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twinagent-api
    command: >
      sh -c "python scripts/bootstrap_demo_data.py &&
             python -m uvicorn twinagent.api.main:app
             --host 0.0.0.0
             --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twinagent-dashboard
    command: >
      sh -c "python scripts/bootstrap_demo_data.py &&
             python -m streamlit run src/twinagent/dashboard/streamlit_app.py
             --server.address 0.0.0.0
             --server.port 8501
             --server.headless true"
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      - api
